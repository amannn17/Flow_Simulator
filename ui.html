  bar.innerHTML = '<div class="timeout-label"><span>No response' + hint + '</span><span class="timeout-countdown" id="' + countId + '">' + secs + 's</span></div>' +
    '<div class="timeout-track"><div class="timeout-fill" id="' + fillId + '" style="width:100%"></div></div>';
  area.appendChild(bar);
  scrollChat(instance);

  s.timeoutTimer = setInterval(function() {
    remaining--;
    var countEl = document.getElementById(countId);
    var fillEl  = document.getElementById(fillId);
    if (countEl) countEl.textContent = remaining + 's';
    if (fillEl)  fillEl.style.width = ((remaining / secs) * 100) + '%';
    if (remaining <= 0) {
      clearInterval(s.timeoutTimer); s.timeoutTimer = null;
      bar.remove();
      if (ec && ec.text && ec.text !== '[EMPTY]') {
        appendSystem(instance, '⏰ Timeout — sending reminder');
        var ecText = ec.text;
        showTyping(instance, 1400, function() {
          appendBubble(instance, ecText, 'recv');
          if (node.next && node.next.length > 0) {
            setTimeout(function() { playNode(instance, node.next[0].toIndex); }, 2000);
          }
        });
      } else if (node.next && node.next.length > 0) {
        appendSystem(instance, '⏰ Timeout — continuing');
        setTimeout(function() { playNode(instance, node.next[0].toIndex); }, 1500);
      }
    }
  }, 1000);
}

function sendUserMessage(instance) {
  var input = document.getElementById(msgInputId(instance));
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  appendBubble(instance, text, 'sent');
  clearSimTimers(sims[instance]);
  document.getElementById(chatAreaId(instance)).querySelectorAll('.timeout-bar').forEach(function(el) { el.remove(); });
  var node = flow.nodes[sims[instance].currentIndex];
  if (!node) return;
  var match = null;
  for (var j = 0; j < (node.next || []).length; j++) {
    if (node.next[j].label && text.toLowerCase().includes(node.next[j].label.toLowerCase())) {
      match = node.next[j].toIndex; break;
    }
  }
  var target = match !== null ? match : (node.next && node.next.length > 0 ? node.next[0].toIndex : null);
  if (target !== null && target !== undefined) {
    setTimeout(function() { playNode(instance, target); }, 1200 + Math.floor(Math.random() * 800));
  } else {
    appendSystem(instance, '✅ End of flow');
  }
  enableInput(instance, false);
}

document.getElementById('fullMsgInput').addEventListener('keydown',  function(e) { if (e.key === 'Enter') sendUserMessage('full'); });

function enableInput(instance, enabled) {
  document.getElementById(msgInputId(instance)).disabled = !enabled;
  document.getElementById(sendBtnId(instance)).disabled  = !enabled;
}

function updateProgress(instance) {
  var s = sims[instance];
  var visited = s.history.length;
  var total = s.totalSteps || flow.nodes.length;
  var pct = total > 0 ? Math.min((visited / total) * 100, 100) : 0;
  document.getElementById(progressFillId(instance)).style.width = pct + '%';
  document.getElementById(progressLabelId(instance)).textContent = visited + '/' + total;
}

function scrollChat(instance) {
  var area = document.getElementById(chatAreaId(instance));
  setTimeout(function() { area.scrollTop = area.scrollHeight; }, 50);
}

function currentTime() {
  var d = new Date();
  return d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
}

function runSimulator() {
  if (!simulatorGateOk()) return;
  switchTab('simulator');
  restartSim('full');
}

// Block entering the simulator while any button label exceeds 20 chars
function simulatorGateOk() {
  var bad = collectLengthViolations();
  if (bad.length === 0) return true;
  var first = bad[0];
  showToast('⛔ ' + bad.length + ' button label' + (bad.length > 1 ? 's' : '') +
    ' over 20 characters — fix to run the simulator. (Node #' + (first.idx + 1) + ')');
  switchTab('editor');
  selectNode(first.idx);
  focusNode(first.idx);
  return false;
}

function selectNode(idx) {
  var sel = document.querySelectorAll('.flow-node-card.selected');
  for (var i = 0; i < sel.length; i++) sel[i].classList.remove('selected');
  var card = document.getElementById('node-card-' + idx);
  if (card) card.classList.add('selected');
}

function focusNode(idx) {
  var n = flow.nodes[idx];
  if (!n) return;
  var wrap = document.getElementById('canvasWrap');
  var r = wrap.getBoundingClientRect();
  if (canvas.scale < 0.8) canvas.scale = 0.8;
  canvas.panX = r.width / 2 - (n.layoutX + NODE_W / 2) * canvas.scale;
  canvas.panY = r.height / 2 - (n.layoutY + 60) * canvas.scale;
  applyTransform();
}

var _toastTimer = null;
function showToast(msg) {
  var t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.className = 'toast';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { t.classList.remove('show'); }, 4200);
}

function switchTab(name) {
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  var panels = document.querySelectorAll('.tab-panel');
  for (var i = 0; i < panels.length; i++) panels[i].classList.remove('active');
  var tabEl = document.querySelector('[data-tab="' + name + '"]');
  if (tabEl) tabEl.classList.add('active');
  var panel = document.getElementById('tab-' + name);
  if (panel) panel.classList.add('active');
  if (name === 'simulator') setTimeout(function() { relayoutFolds('full'); }, 0);
}

// ── TABS ──
document.querySelectorAll('.tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    if (tab.dataset.tab === 'simulator' && !simulatorGateOk()) return;
    switchTab(tab.dataset.tab);
  });
});

applyTransform();
</script>
